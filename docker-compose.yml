services:
  openclaw:
    build: .
    cap_add:
      - NET_ADMIN
      - NET_RAW
    user: root
    entrypoint: ["/bin/sh", "-c", "/usr/local/bin/init-firewall.sh && exec su -s /bin/sh node -c 'docker-entrypoint.sh node openclaw.mjs gateway --allow-unconfigured'"]
    volumes:
      - .:/app/workspace
      - ./.openclaw:/home/node/.openclaw
      - ./skills:/app/skills
    ports:
      - "18789:18789"
    env_file:
      - .env
    restart: unless-stopped
